services:
  postgres:
    user: root
    image: postgres:16
    container_name: agent-postgres
    restart: on-failure
    environment:
      POSTGRES_DB: aiagent
      POSTGRES_USER: aiagent
      POSTGRES_PASSWORD: bB6C8tQu9YuLWqMq
      TZ: Asia/Hong_Kong
    ports:
      - "5432:5432"
    volumes:
      - /mnt/data/misc/ai-agent/pgsql:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'

  qdrant:
    user: root
    image: qdrant/qdrant:latest
    container_name: agent-qdrant
    restart: on-failure
    environment:
      TZ: Asia/Hong_Kong
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - /mnt/data/misc/ai-agent/qdrant:/qdrant/storage
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.5'
        reservations:
          memory: 512M
          cpus: '0.5'
